name: Reusable Node CI

on:
  workflow_call:                 # <-- kunci: bikin workflow ini "dipanggil"
    inputs:
      node-version:
        required: false
        type: string
        default: '20'
      run-lint:
        required: false
        type: boolean
        default: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
      - run: npm ci
      - if: ${{ inputs.run-lint }}
        run: npm run lint
      - run: npm run build